<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dynamic Statement Page</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
   <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        .row-header {
            font-weight: bold;
            border-bottom: 2px solid #222;
            padding-bottom: 8px;
        }
        .txn-row {
            padding: 8px 0;
            border-bottom: 1px solid #ddd;
        }
        .totals-row {
            font-weight: bold;
            background: #f8f9fa;
            padding: 10px 0;
        }
        .balance-box {
            font-size: 1.2rem;
            font-weight: bold;
            padding: 12px;
            background: #e8ffe8;
            border: 1px solid #n3f6y1;
            border-radius: 6px;
        }
    </style>
</head>
<body class="container py-5">

    <h2 class="mb-5">Dynamic Statement</h2>

    <!-- INPUT FORM -->
    <div class="row g-3 mb-4">
        <div class="col-md-2"><input id="txnId" class="form-control" placeholder="TxnId"></div>
        <div class="col-md-2">
    <div class="input-group">
        <input id="txnDate" type="date" class="form-control">
        <span class="input-group-text">
            <i class="bi bi-calendar-date"></i>
        </span>
    </div>
</div>
        <div class="col-md-2"><input id="header" class="form-control" placeholder="Header"></div>
        <div class="col-md-2"><input id="credit" type="number" class="form-control" placeholder="Credit"></div>
        <div class="col-md-2"><input id="debit" type="number" class="form-control" placeholder="Debit"></div>
        <div class="col-md-2 d-grid">
            <button class="btn btn-primary" onclick="addTxn()">ADD</button>
        </div>
    </div>

    <!-- LIST HEADER -->
    <div class="row row-header">
        <div class="col-1">TxnId</div>
        <div class="col-2">Txn Date</div>
        <div class="col-3">Header</div>
        <div class="col-2">Credit</div>
        <div class="col-2">Debit</div>
        <div class="col-2">Action</div>
    </div>

    <!-- DATA CONTAINER -->
    <div id="txnList"></div>

    <!-- TOTALS -->
    <div class="row totals-row mt-3">
        <div class="col-6 text-end">Totals:</div>
        <div class="col-2" id="totalCredit">0</div>
        <div class="col-2" id="totalDebit">0</div>
        <div class="col-2"></div>
    </div>

    <!-- BALANCE -->
    <div class="mt-4 balance-box">
        Balance: <span id="balance">0</span>
    </div>

<script type="module">
    let transactions = JSON.parse(localStorage.getItem("transactions")) || [];

    function saveData() {
        localStorage.setItem("transactions", JSON.stringify(transactions));
    }

    function addTxn() {
     
const id = document.getElementById("txnId");
    const date = document.getElementById("txnDate");
    const header = document.getElementById("header");
    const credit = document.getElementById("credit");
    const debit = document.getElementById("debit");

    // Validate
    if (id.value === "" || date.value === "" || header.value === "") {
        alert("Please fill all fields");
        return;
    }

    const txn = {
        id: id.value,
        date: date.value,
        header: header.value,
        credit: Number(credit.value) || 0,
        debit: Number(debit.value) || 0
    };

    transactions.push(txn);
    saveData();
    render();

    // ★ CLEAR INPUTS — This works 100%
    id.value = "";
    date.value = "";
    header.value = "";
    credit.value = "";
    debit.value = "";

    // (Optional) put cursor back on TxnID
    id.focus();


    }

    function render() {
        let html = "";
        let totalCredit = 0, totalDebit = 0;

        transactions.forEach((t, i) => {
            html += `
                <div class="row txn-row">
                    <div class="col-1">${t.id}</div>
                    <div class="col-2">${t.date}</div>
                    <div class="col-3">${t.header}</div>
                    <div class="col-2">${t.credit}</div>
                    <div class="col-2">${t.debit}</div>
                    <div class="col-2">
                        <button class="btn btn-sm btn-danger" onclick="removeTxn(${i})">REMOVE</button>
                    </div>
                </div>
            `;
            totalCredit += t.credit;
            totalDebit += t.debit;
        });

        document.getElementById("txnList").innerHTML = html;
        document.getElementById("totalCredit").innerText = totalCredit;
        document.getElementById("totalDebit").innerText = totalDebit;
        document.getElementById("balance").innerText = totalCredit - totalDebit;

    }

window.removeTxn = function(index) {
    transactions.splice(index, 1);
    saveData();
    render();
};

    render();
</script>

</body>
</html>
